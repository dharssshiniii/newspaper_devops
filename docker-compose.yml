version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '3001:3000'  # Changed from 3000 to 3001
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/newspaperDB
      - SESSION_SECRET=super-secret-session-key
      - USE_MONGODB=true  # Enable MongoDB connection
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '8081:80'  # Changed from 8080 to 8081
    depends_on:
      - backend

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: newspaperDB
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
